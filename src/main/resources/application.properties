# Spring application name
spring.application.name=AddressBookApp

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/addressbook_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Kushagra03
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate dialect for MySQL 8
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Hibernate DDL-auto behavior
hibernate.hbm2ddl.auto=update

# Enable SQL logging (optional, useful for debugging)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# HikariCP connection pool settings (default for Spring Boot)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000


# Enable logging at INFO level
logging.level.root=INFO

# Customize log format
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %level [%thread] %logger{36} - %msg%n

# Log to a file
logging.file.name=logs/addressbook-app.log
