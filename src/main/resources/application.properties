# Application Name
spring.application.name=AddressBookApp

# Database Configuration (Using Environment Variables)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/addressbook}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:your_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Set active profile (Change this in different environments)
spring.profiles.active=dev

# Common Logging Defaults
logging.level.root=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %level [%thread] %logger{36} - %msg%n
logging.file.name=logs/addressbook-app.log
