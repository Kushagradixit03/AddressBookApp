# Database Configuration
spring.datasource.url=jdbc:mysql://prod-db-server:3306/addressbook_db?useSSL=true&serverTimezone=UTC
spring.datasource.username=prod_user
spring.datasource.password=prod_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate settings
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
hibernate.hbm2ddl.auto=validate  # Prevents automatic schema changes
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# HikariCP Connection Pool (optimized for production)
spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.connection-timeout=20000

# Logging Settings
logging.level.root=ERROR
logging.file.name=logs/prod-addressbook-app.log
